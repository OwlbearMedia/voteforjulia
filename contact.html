    <main>
      <section id="contact">
        <h2>Contact and Volunteer</h2>

        <div class="stances-layout">
          <div class="stances-text">
            <p>
              Join the campaign team to help with outreach, events, and voter
              engagement.
            </p>
            <h3>Contact the Campaign</h3>
            <form
              class="contact-form"
              action="https://formspree.io/f/meedarrd"
              method="POST"
            >
              <label for="contact-name">Name</label>
              <input id="contact-name" name="name" type="text" required />

              <label for="contact-email">Email</label>
              <input id="contact-email" name="email" type="email" required />

              <label for="contact-message">Message</label>
              <textarea
                id="contact-message"
                name="message"
                rows="5"
                required
              ></textarea>

              <button type="submit">Send Message</button>
            </form>
          </div>
          <img
            src="img/julia-conversation.jpg"
            alt="Julia Hamann"
            class="coming-soon"
            width="767"
            height="960"
            loading="lazy"
            decoding="async"
          />
        </div>
      </section>
    </main>
