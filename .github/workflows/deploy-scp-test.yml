name: Deploy Test via SCP

on:
  pull_request:
    types:
      - closed
    branches:
      - develop

permissions:
  contents: read

concurrency:
  group: deploy-develop
  cancel-in-progress: true

jobs:
  deploy_frontend:
    name: Build and upload frontend over SSH (test)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm test

      - name: Build site
        env:
          VITE_API_BASE_URL: https://test-api.voteforjulia.com
        run: pnpm run build

      - name: Write no-index robots.txt for test deploy
        run: |
          cat > dist/robots.txt <<'EOF'
          User-agent: *
          Disallow: /
          EOF

      - name: Add noindex meta tag to built test HTML
        run: |
          find dist -type f -name '*.html' -print0 | while IFS= read -r -d '' file; do
            if grep -qi '<meta name="robots"' "$file"; then
              sed -i 's#<meta name="robots"[^>]*>#<meta name="robots" content="noindex,nofollow,noarchive" />#I' "$file"
            else
              sed -i 's#</head>#  <meta name="robots" content="noindex,nofollow,noarchive" />\n</head>#I' "$file"
            fi
          done

      - name: Upload dist contents to test server root
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          source: dist/**
          target: ./public_html_test
          overwrite: true
          strip_components: 1

      - name: Upload .htaccess to test server root
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          source: dist/.htaccess
          target: ./public_html_test
          overwrite: true
          strip_components: 1

  deploy_python:
    name: Build and upload Python API over SSH (test)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: python -m pip install -r api/requirements.txt

      - name: Run Python API tests
        run: python -m unittest api/test_models.py api/test_email_service.py

      - name: Upload api contents to test api directory
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          source: api/**
          target: ./api_test
          overwrite: true
          strip_components: 1

      - name: Restart Python app (Passenger) in test
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            mkdir -p ./api_test/tmp
            touch ./api_test/tmp/restart.txt

  deploy_summary:
    name: Deployment summary (test)
    if: ${{ always() && github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    needs:
      - deploy_frontend
      - deploy_python

    steps:
      - name: Report deploy results
        run: |
          echo "Frontend deploy result: ${{ needs.deploy_frontend.result }}"
          echo "Python deploy result:   ${{ needs.deploy_python.result }}"

      - name: Fail if any deploy job failed
        run: |
          if [[ "${{ needs.deploy_frontend.result }}" != "success" || "${{ needs.deploy_python.result }}" != "success" ]]; then
            echo "One or more deployment jobs did not succeed."
            exit 1
          fi
