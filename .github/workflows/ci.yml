name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-tests:
    name: Typecheck and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: python -m pip install -r api/requirements.txt

      - name: Run typecheck
        run: pnpm exec vue-tsc -b

      - name: Run frontend tests
        run: pnpm test

      - name: Run Python API tests
        run: python -m unittest api/test_app.py api/test_models.py api/test_email_service.py
