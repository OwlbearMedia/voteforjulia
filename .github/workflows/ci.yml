name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-tests:
    name: Typecheck and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: python -m pip install -r api/requirements.txt

      - name: Run typecheck
        run: pnpm exec vue-tsc -b

      - name: Check formatting
        run: pnpm run format:check

      - name: Run frontend tests with coverage
        run: pnpm run test:coverage

      - name: Publish coverage summary
        if: always()
        run: |
          set -euo pipefail
          SUMMARY_FILE=coverage/coverage-summary.json
          if [ ! -f "$SUMMARY_FILE" ]; then
            echo "No coverage summary found at $SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          node --input-type=module <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          import { readFileSync } from 'node:fs';
          const { total } = JSON.parse(readFileSync('coverage/coverage-summary.json', 'utf8'));
          const row = (label, m) => `| ${label} | ${m.pct}% | ${m.covered}/${m.total} |`;
          console.log('### Frontend test coverage');
          console.log('');
          console.log('| Metric | % | Covered / Total |');
          console.log('| --- | --- | --- |');
          console.log(row('Statements', total.statements));
          console.log(row('Branches', total.branches));
          console.log(row('Functions', total.functions));
          console.log(row('Lines', total.lines));
          NODE

      - name: Run Python API tests
        run: python -m unittest api/test_app.py api/test_models.py api/test_email_service.py

  deploy-test-frontend:
    name: Deploy frontend to test environment
    needs: typecheck-and-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        env:
          VITE_API_BASE_URL: https://test-api.voteforjulia.com
          SOURCEMAP_MODE: 'true'
        run: pnpm run build

      - name: Write no-index robots.txt for test deploy
        run: |
          cat > dist/robots.txt <<'EOF'
          User-agent: *
          Disallow: /
          EOF

      - name: Add noindex meta tag to built test HTML
        run: |
          find dist -type f -name '*.html' -print0 | while IFS= read -r -d '' file; do
            if grep -qi '<meta name="robots"' "$file"; then
              sed -i 's#<meta name="robots"[^>]*>#<meta name="robots" content="noindex,nofollow,noarchive" />#I' "$file"
            else
              sed -i 's#</head>#  <meta name="robots" content="noindex,nofollow,noarchive" />\n</head>#I' "$file"
            fi
          done

      - name: Upload dist contents to test server root
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          source: dist/**
          target: ./public_html_test
          overwrite: true
          strip_components: 1

      - name: Upload .htaccess to test server root
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          source: dist/.htaccess
          target: ./public_html_test
          overwrite: true
          strip_components: 1

  deploy-test-api:
    name: Deploy Python API to test environment
    needs: typecheck-and-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: python -m pip install -r api/requirements.txt

      - name: Run Python API tests
        run: python -m unittest api/test_models.py api/test_email_service.py

      - name: Upload api contents to test api directory
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          source: api/**
          target: ./api_test
          overwrite: true
          strip_components: 1

      - name: Restart Python app (Passenger) in test
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            mkdir -p ./api_test/tmp
            touch ./api_test/tmp/restart.txt
