name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-frontend:
    name: Typecheck and frontend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm exec vue-tsc -b

      - name: Check formatting
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Run frontend tests with coverage
        run: pnpm run test:coverage

      - name: Publish coverage summary
        if: always()
        run: |
          set -euo pipefail
          SUMMARY_FILE=coverage/coverage-summary.json
          if [ ! -f "$SUMMARY_FILE" ]; then
            echo "No coverage summary found at $SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          node --input-type=module <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          import { readFileSync } from 'node:fs';
          const { total } = JSON.parse(readFileSync('coverage/coverage-summary.json', 'utf8'));
          const row = (label, m) => `| ${label} | ${m.pct}% | ${m.covered}/${m.total} |`;
          console.log('### Frontend test coverage');
          console.log('');
          console.log('| Metric | % | Covered / Total |');
          console.log('| --- | --- | --- |');
          console.log(row('Statements', total.statements));
          console.log(row('Branches', total.branches));
          console.log(row('Functions', total.functions));
          console.log(row('Lines', total.lines));
          NODE

      - name: Upload coverage to Codecov
        # Secrets are unavailable to Dependabot runs, and a Codecov hiccup should
        # never fail CI, so guard the actor and never block the pipeline.
        if: github.actor != 'dependabot[bot]'
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  test-api:
    name: Python API tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install Python dependencies
        run: python -m pip install -r api/requirements.txt

      - name: Run Python API tests
        run: python -m unittest api/test_app.py api/test_models.py api/test_email_service.py

