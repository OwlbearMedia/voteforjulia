name: Deploy via SCP

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Upload files over SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed deploy files
        id: changed-files
        shell: bash
        run: |
          before_sha="${{ github.event.before }}"
          after_sha="${{ github.sha }}"

          if [[ "$before_sha" == "0000000000000000000000000000000000000000" ]]; then
            changed_files=$(git ls-files '*.html' robots.txt sitemap.xml css js img)
          else
            changed_files=$(git diff --name-only --diff-filter=ACMR "$before_sha" "$after_sha" -- '*.html' robots.txt sitemap.xml css js img)
          fi

          changed_files=$(printf '%s\n' "$changed_files" | sed '/^$/d')

          if [[ -z "$changed_files" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          files_csv=$(printf '%s\n' "$changed_files" | paste -sd, -)
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "files=$files_csv" >> "$GITHUB_OUTPUT"

      - name: Upload files to server
        if: steps.changed-files.outputs.has_changes == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          source: ${{ steps.changed-files.outputs.files }}
          target: ${{ secrets.SSH_TARGET_PATH }}
          overwrite: true
          strip_components: 0
