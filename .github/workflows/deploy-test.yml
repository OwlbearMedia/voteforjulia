name: Deploy to test environment

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches-ignore:
      - main

permissions:
  contents: read

# One test environment — last PR to pass CI wins.
concurrency:
  group: deploy-test
  cancel-in-progress: true

jobs:
  deploy-test-frontend:
    name: Deploy frontend to test environment
    # Only deploy when CI passed on a pull_request event, and skip Dependabot
    # PRs which lack deploy secrets.
    if: |
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      !startsWith(github.event.workflow_run.head_branch, 'dependabot/') &&
      github.event.workflow_run.triggering_actor.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        env:
          VITE_API_BASE_URL: https://test-api.voteforjulia.com
          SOURCEMAP_MODE: 'true'
        run: pnpm run build

      - name: Write no-index robots.txt for test deploy
        run: |
          cat > dist/robots.txt <<'EOF'
          User-agent: *
          Disallow: /
          EOF

      - name: Add noindex meta tag to built test HTML
        run: |
          find dist -type f -name '*.html' -print0 | while IFS= read -r -d '' file; do
            if grep -qi '<meta name="robots"' "$file"; then
              sed -i 's#<meta name="robots"[^>]*>#<meta name="robots" content="noindex,nofollow,noarchive" />#I' "$file"
            else
              sed -i 's#</head>#  <meta name="robots" content="noindex,nofollow,noarchive" />\n</head>#I' "$file"
            fi
          done

      - name: Upload dist contents to test server root
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          source: dist/**
          target: ./public_html_test
          overwrite: true
          strip_components: 1

      - name: Upload .htaccess to test server root
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          source: dist/.htaccess
          target: ./public_html_test
          overwrite: true
          strip_components: 1

  deploy-test-api:
    name: Deploy Python API to test environment
    if: |
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      !startsWith(github.event.workflow_run.head_branch, 'dependabot/') &&
      github.event.workflow_run.triggering_actor.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Upload api contents to test api directory
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          source: api/**
          target: ./api_test
          overwrite: true
          strip_components: 1

      - name: Restart Python app (Passenger) in test
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            mkdir -p ./api_test/tmp
            touch ./api_test/tmp/restart.txt
