name: Deploy to test environment

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches-ignore:
      - main

permissions:
  contents: read
  pull-requests: read

# One test environment — serialize deploys so a newer run never interrupts an
# in-flight SCP upload and leaves the environment in a partially updated state.
concurrency:
  group: deploy-test
  cancel-in-progress: false

jobs:
  gate:
    name: Check deployment conditions
    if: |
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      !startsWith(github.event.workflow_run.head_branch, 'dependabot/') &&
      github.event.workflow_run.triggering_actor.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}

    steps:
      - name: Verify commit is still the HEAD of its branch and PR is open
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          current_sha=$(gh api "repos/${{ github.repository }}/git/ref/heads/${HEAD_BRANCH}" --jq '.object.sha' 2>/dev/null) || {
            echo "Branch ${HEAD_BRANCH} not found, skipping deploy."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          }
          if [ "$current_sha" != "$HEAD_SHA" ]; then
            echo "Stale re-run: ${HEAD_SHA} is not the current HEAD of ${HEAD_BRANCH} (${current_sha}), skipping deploy."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          open_prs=$(gh api "repos/${{ github.repository }}/pulls?state=open&head=${{ github.repository_owner }}:${HEAD_BRANCH}" --jq 'length')
          if [ "$open_prs" == "0" ]; then
            echo "No open PR for ${HEAD_BRANCH}, skipping deploy."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

  deploy-test-frontend:
    name: Deploy frontend to test environment
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        env:
          VITE_API_BASE_URL: https://test-api.voteforjulia.com
          SOURCEMAP_MODE: 'true'
        run: pnpm run build

      - name: Write no-index robots.txt for test deploy
        run: |
          cat > dist/robots.txt <<'EOF'
          User-agent: *
          Disallow: /
          EOF

      - name: Add noindex meta tag to built test HTML
        run: |
          find dist -type f -name '*.html' -print0 | while IFS= read -r -d '' file; do
            if grep -qi '<meta name="robots"' "$file"; then
              sed -i 's#<meta name="robots"[^>]*>#<meta name="robots" content="noindex,nofollow,noarchive" />#I' "$file"
            else
              sed -i 's#</head>#  <meta name="robots" content="noindex,nofollow,noarchive" />\n</head>#I' "$file"
            fi
          done

      - name: Upload dist contents to test server root
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          source: dist/**
          target: ./public_html_test
          overwrite: true
          strip_components: 1

      - name: Upload .htaccess to test server root
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          source: dist/.htaccess
          target: ./public_html_test
          overwrite: true
          strip_components: 1

  deploy-test-api:
    name: Deploy Python API to test environment
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Upload api contents to test api directory
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          source: api/**
          target: ./api_test
          overwrite: true
          strip_components: 1

      - name: Restart Python app (Passenger) in test
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            mkdir -p ./api_test/tmp
            touch ./api_test/tmp/restart.txt

  e2e-tests:
    name: Cypress e2e tests
    needs: [deploy-test-frontend, deploy-test-api]
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Wait for test site to be ready
        run: |
          for i in $(seq 1 20); do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://test.voteforjulia.com/)
            if [ "$status" = "200" ]; then
              echo "Site ready (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status $status, retrying in 5s..."
            sleep 5
          done
          echo "Site did not become ready in time"
          exit 1

      - name: Run Cypress e2e tests
        uses: cypress-io/github-action@v6
        with:
          install-command: pnpm install --frozen-lockfile
          browser: chrome
          headed: false
        env:
          CYPRESS_BASE_URL: https://test.voteforjulia.com
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore
