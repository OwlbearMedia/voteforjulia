name: Deploy to production

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-frontend:
    name: Build frontend
    # Only deploy when CI passed — a failed or cancelled CI run should not deploy.
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Pin to the exact commit CI verified, not just the branch HEAD.
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        env:
          VITE_API_BASE_URL: https://api.voteforjulia.com
          NEW_RELIC_API_KEY: ${{ secrets.NEW_RELIC_API_KEY }}
          PUBLIC_BASE_URL: https://voteforjulia.com
        run: pnpm run build:deploy

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist
          include-hidden-files: true
          retention-days: 1

  deploy-frontend:
    name: Deploy frontend
    needs: build-frontend
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://voteforjulia.com

    steps:
      - name: Download build output
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: dist

      - name: Prepare clean staging directory on server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            rm -rf ./public_html_next
            mkdir -p ./public_html_next

      - name: Upload dist contents to staging directory
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          source: dist/**
          target: ./public_html_next
          overwrite: true
          strip_components: 1

      - name: Upload .htaccess to staging directory
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          source: dist/.htaccess
          target: ./public_html_next
          overwrite: true
          strip_components: 1

      - name: Atomically swap staging into the live document root
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            if [ ! -d ./public_html_next ]; then
              echo "Staging directory ./public_html_next is missing; aborting swap." >&2
              exit 1
            fi
            # Remove the previous rollback snapshot, demote the current live
            # document root to the rollback slot, then promote staging. The two
            # renames are atomic on the same filesystem, so the live directory is
            # only momentarily absent (sub-second) instead of serving a mix of old
            # and new files during a multi-step upload.
            rm -rf ./public_html_prev
            if [ -d ./public_html ]; then
              mv ./public_html ./public_html_prev
            fi
            mv ./public_html_next ./public_html
            echo "Swapped new build into ./public_html (previous build kept at ./public_html_prev)."

  verify-frontend:
    name: Verify frontend
    needs: deploy-frontend
    runs-on: ubuntu-latest

    steps:
      - name: Verify frontend is responding
        run: curl --fail --max-time 15 --retry 3 --retry-delay 5 https://voteforjulia.com

  deploy-api:
    name: Deploy Python API
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.voteforjulia.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Upload api contents to server api directory
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          source: api/**
          target: ./api
          overwrite: true
          strip_components: 1

      - name: Restart Python app (Passenger)
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            mkdir -p ./api/tmp
            touch ./api/tmp/restart.txt

  verify-api:
    name: Verify Python API
    needs: deploy-api
    runs-on: ubuntu-latest

    steps:
      - name: Verify API is responding
        run: curl --fail --max-time 15 --retry 5 --retry-delay 5 https://api.voteforjulia.com/health
